<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio of Abhishek Kumar, MCA student and tech enthusiast interested in full-stack development, cloud, and AI/ML.">
  <title>Abhishek Kumar | Portfolio - VS Code</title>
  <link rel="icon" type="image/jpg" href="profile.jpg">
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Early Theme Initialization to prevent Flash of Light Theme -->
  <script>
    (function () {
      try {
        function getCookie(name) {
          const match = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)"));
          return match ? match[2] : null;
        }
        const storedTheme = getCookie("theme") || "dark";
        document.documentElement.setAttribute("data-theme", storedTheme);
      } catch (e) {
        console.error("Theme initialization error:", e);
      }
    })();
  </script>
</head>
<body>

  <div class="app-container">
    <!-- Main Shell Workspace -->
    <div class="main-content">
      
      <!-- 1. ACTIVITY BAR (Leftmost narrow sidebar) -->
      <div class="activity-bar">
        <div class="activity-bar-group">
          <!-- Explorer Tab -->
          <a href="#" id="explorer-nav-item" class="activity-item active" title="Explorer">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-files"><path d="M15 2h-4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V8"></path><path d="M16.706 2.706A2.4 2.4 0 0 0 15 2v5a1 1 0 0 0 1 1h5a2.4 2.4 0 0 0-.706-1.706z"></path><path d="M5 7a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h8a2 2 0 0 0 1.732-1"></path></svg>
          </a>
          <!-- Search Tab -->
          <a href="#" id="search-nav-item" class="activity-item" title="Search Files">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search"><path d="m21 21-4.34-4.34"></path><circle cx="11" cy="11" r="8"></circle></svg>
          </a>
          <!-- Tags Filter Tab -->
          <a href="#" id="tags-nav-item" class="activity-item" title="Browse Tags">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-tag"><path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"></path><circle cx="7.5" cy="7.5" r=".5" fill="currentColor"></circle></svg>
          </a>
        </div>
        <div class="activity-bar-group">
          <!-- Fake About Me / Profile Trigger -->
          <a href="#" class="activity-item" title="Open About Me" onclick="event.preventDefault(); openFile('about');">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          </a>
          <!-- Settings Trigger -->
          <a href="#" id="settings-nav-item" class="activity-item" title="Settings">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-settings"><path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </a>
        </div>
      </div>
      
      <!-- 2. SIDEBAR PANEL CONTAINER -->
      <div id="side-pane" class="side-pane transition-all-200">
        <div class="pane-header">
          <span id="pane-header-title">Explorer</span>
          <i href="#" id="close-side-pane-btn" class="fas fa-chevron-left cursor-pointer" title="Collapse Sidebar"></i>
        </div>
        
        <div class="pane-content">
          <!-- View A: Explorer Tree -->
          <div id="explorer-pane-view">
            <div class="tree-section-header">
              <i class="fas fa-chevron-down"></i> Content
            </div>
            <div id="tree-content-container">
              <!-- Dynamically populated from JS -->
            </div>
          </div>
          
          <!-- View B: Search -->
          <div id="search-pane-view" style="display: none;">
            <div class="search-container">
              <div class="search-input-wrapper">
                <i class="fas fa-search search-icon-inside"></i>
                <input type="text" id="search-input" class="search-input" placeholder="Search text..." autocomplete="off">
              </div>
              <div id="search-results" class="search-results">
                <!-- Dynamically populated from JS -->
              </div>
            </div>
          </div>
          
          <!-- View C: Tags Filter -->
          <div id="tags-pane-view" style="display: none;">
            <div id="tags-count-container" class="tags-list-container">
              <!-- Dynamically populated from JS -->
            </div>
          </div>
          
          <!-- View D: Settings & Theme selection -->
          <div id="settings-pane-view" style="display: none;">
            <div class="settings-sidebar-nav" style="width: 100%; border-right: none; background-color: transparent;">
              <div class="settings-nav-header">Commonly Used</div>
              <div class="settings-nav-item active">
                <i class="fas fa-palette" style="margin-right: 8px; font-size: 12px;"></i> Appearance
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- 3. EDITOR WINDOW CONTAINER (Center Editor Area) -->
      <div class="editor-pane">
        <!-- Editor Tabs Bar -->
        <div id="tab-bar" class="tab-bar">
          <!-- Dynamically populated from JS -->
        </div>
        
        <!-- Active Tab Document Content -->
        <div id="editor-window" class="editor-window">
          <!-- Dynamically populated from JS -->
        </div>
      </div>
      
      <!-- 4. INFORMATION SIDEBAR (Rightmost sidebar) -->
      <div class="info-panel transition-all-200">
        <!-- Section A: Outline (Table of contents) -->
        <div class="info-section">
          <div class="info-section-header" onclick="toggleRightSection('outline')">
            <i class="fas fa-chevron-down" id="outline-chevron"></i>
            <span>Outline</span>
          </div>
          <div id="outline-container" class="outline-list">
            <!-- Dynamically populated from headings in JS -->
          </div>
        </div>
        
        <!-- Section B: Related posts/files -->
        <div class="info-section">
          <div class="info-section-header" onclick="toggleRightSection('related')">
            <i class="fas fa-chevron-down" id="related-chevron"></i>
            <span>Related Files</span>
          </div>
          <div id="related-container" class="related-list">
            <!-- Dynamically populated from JS -->
          </div>
        </div>
        
        <!-- Section C: Active File Tags Cloud -->
        <div class="info-section">
          <div class="info-section-header" onclick="toggleRightSection('tags')">
            <i class="fas fa-chevron-down" id="tags-chevron"></i>
            <span>Tags</span>
          </div>
          <div id="tags-cloud-container" class="tags-cloud">
            <!-- Dynamically populated from JS -->
          </div>
        </div>
      </div>
      
    </div>
    
    <!-- 5. STATUS BAR (Bottom-most bar) -->
    <div class="status-bar">
      <div class="status-left">
        <div class="status-item clickable" title="Git Repository Branch">
          <i class="fas fa-code-branch"></i>
          <span>main*</span>
        </div>
        <div class="status-item clickable" title="Synchronize Changes">
          <i class="fas fa-sync-alt"></i>
        </div>
        <div class="status-item" title="No errors found">
          <i class="fas fa-check-circle"></i>
          <span>0</span>
        </div>
      </div>
      <div class="status-right">
        <div class="status-item status-item-desktop">
          <span>Ln 1, Col 1</span>
        </div>
        <div class="status-item status-item-desktop">
          <span>Spaces: 2</span>
        </div>
        <div class="status-item status-item-desktop">
          <span>UTF-8</span>
        </div>
        <div class="status-item status-item-desktop">
          <span>Markdown</span>
        </div>
        <div id="status-theme-trigger" class="status-item clickable" title="Active Theme (Click to change)">
          <i class="fas fa-paint-brush"></i>
          <span id="active-theme-text">Dark</span>
        </div>
      </div>
    </div>
    
  </div>

  <!-- Main JavaScript File -->
  <script src="script.js"></script>
</body>
</html>
